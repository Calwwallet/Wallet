# ===========================================
# Agent Wallet Service - Production Docker Compose
# ===========================================
# Production deployment configuration
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ===========================================

services:
  # -----------------------------------------------------
  # Main Application - Production
  # -----------------------------------------------------
  agent-wallet-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner  # Use production stage
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DOCKER_TARGET=production
    env_file:
      - .env.production
    volumes:
      - wallet_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - agent-wallet-network
    deploy:
      replicas: 2  # Run 2 instances for HA
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # -----------------------------------------------------
  # Redis - Production
  # -----------------------------------------------------
  redis:
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 512M

  # -----------------------------------------------------
  # PostgreSQL - Production
  # -----------------------------------------------------
  postgres:
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentwallet}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups  # Mount for backups
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100

  # -----------------------------------------------------
  # Nginx Load Balancer (Optional)
  # -----------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: agent-wallet-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - agent-wallet-service
    networks:
      - agent-wallet-network
    # Only enable in production
    profiles:
      - prod

# -----------------------------------------------------
# Secrets (use Docker secrets in production Swarm/Compose)
# -----------------------------------------------------
# In production, use Docker secrets or external secret management:
#   echo "your-secret" | docker secret create postgres_password -
# Or use external tools like HashiCorp Vault, AWS Secrets Manager, etc.
